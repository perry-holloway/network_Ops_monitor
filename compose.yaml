services:
  ubiquiti-ops-console:
    build: .
    image: ubiquiti-ops-console:local
    container_name: ubiquiti-ops-console
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8090
    ports:
      - "8090:8090"
    volumes:
      - ./data:/data
